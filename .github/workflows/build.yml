name: Build Agent Project

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分钟检测 gitee 分支变化

concurrency:
  group: agent-build
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check-sha.outputs.changed }}
    steps:
      - name: Get gitee HEAD SHA
        id: get-sha
        run: |
          SHA=$(git ls-remote https://dlcboy:${{ secrets.GITEE_TOKEN }}@gitee.com/dlcboy/agent-project.git refs/heads/nuitka-build | cut -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        id: cache-sha
        with:
          path: .last-sha
          key: gitee-nuitka-build-sha
      - name: Compare SHA
        id: check-sha
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Manual trigger, always build."
            exit 0
          fi
          NEW="${{ steps.get-sha.outputs.sha }}"
          OLD=$(cat .last-sha 2>/dev/null || echo "")
          if [ "$NEW" = "$OLD" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes, skip."
          else
            echo "$NEW" > .last-sha
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New commit detected: $NEW"
          fi

  build:
    needs: check
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Clone source (gitee private)
        run: |
          git config --global credential.helper store
          echo "https://dlcboy:${{ secrets.GITEE_TOKEN }}@gitee.com" > ~/.git-credentials
          git clone https://gitee.com/dlcboy/agent-project.git .
          git checkout nuitka-build
          git submodule update --init --recursive

      - name: Set version
        id: version
        run: |
          VER="$(git log -1 --format='%ad' --date=short HEAD)-$(git rev-parse --short=7 HEAD)"
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "Version: $VER"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv sync --python 3.13 --group build

      # ── ccache (Linux only) ──
      - name: Install ccache (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ccache

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - uses: actions/cache@v4
        if: runner.os != 'Windows'
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-nuitka-ccache-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-ccache-

      # ── Nuitka standalone ──
      - name: Build (Nuitka --standalone)
        run: |
          export PYTHONPATH="$PWD/hermes-webui${PYTHONPATH:+:$PYTHONPATH}"
          .venv/bin/python -m nuitka --standalone \
            --output-filename=agent-project \
            --include-package=agent_server \
            --include-package=api \
            --include-data-dir=hermes-webui/static=static \
            --include-data-dir=agent_server/resource=agent_server/resource \
            --assume-yes-for-downloads \
            agent_server/__main__.py

          for d in *.dist; do
            [ -d "$d" ] || continue
            [ "$d" = "agent-project.dist" ] && continue
            mv "$d" agent-project.dist
            break
          done

      # ── Smoke test ──
      - name: Smoke test
        if: runner.os == 'Linux'
        timeout-minutes: 2
        run: |
          cd agent-project.dist
          cat > .env << 'EOF'
          SECRET_KEY=ci-s...ey
          HOST=127.0.0.1
          PORT=8099
          EOF
          ./agent-project &
          PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8099/api/health/agent | grep -q '"alive": *true'; then
              echo "✅ agent-project alive"
              kill $PID 2>/dev/null
              exit 0
            fi
            sleep 1
          done
          kill $PID 2>/dev/null
          echo "❌ agent-project failed to start within 20s"
          exit 1

      # ── Package ──
      - name: Package
        shell: bash
        run: |
          mkdir -p _pkg
          cp -r agent-project.dist _pkg/
          cp .env.example script/run_build_product/run.sh script/run_build_product/run.bat README_BUILD.md _pkg/ 2>/dev/null || true
          cd _pkg
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "../agent-project-${VERSION}-${{ matrix.os }}.zip" . > /dev/null
          else
            zip -r "../agent-project-${VERSION}-${{ matrix.os }}.zip" . > /dev/null
          fi

      # ── Push to Gitee release repo ──
      - name: Push to Gitee
        if: runner.os == 'Linux'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -e
          GITEE_REPO="https://dlcboy:${GITEE_TOKEN}@gitee.com/dlcboy/deepbind-assistant.git"
          if git clone "$GITEE_REPO" /tmp/gitee-release 2>/dev/null; then
            echo "cloned existing repo"
          else
            mkdir -p /tmp/gitee-release && cd /tmp/gitee-release
            git init && git checkout -b master
            git remote add origin "$GITEE_REPO"
          fi
          cd /tmp/gitee-release
          cp "$GITHUB_WORKSPACE/agent-project-${VERSION}-${{ matrix.os }}.zip" .
          git add -A
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git commit -m "ci: build $(date +%Y%m%d-%H%M)" || echo "(no changes)"
          git push origin master

      - uses: actions/upload-artifact@v4
        with:
          name: agent-project-${VERSION}-${{ matrix.os }}
          path: agent-project-${VERSION}-${{ matrix.os }}.zip